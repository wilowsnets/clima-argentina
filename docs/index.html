<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Clima Argentina</title>

  <meta
    name="description"
    content="Pronóstico meteorológico para localidades de Argentina con datos del Servicio Meteorológico Nacional."
  >

  <style>
    :root {
      color-scheme: dark;

      --fondo-superior: #173f70;
      --fondo-inferior: #07182c;
      --panel: rgba(8, 25, 45, 0.94);
      --panel-secundario: rgba(20, 48, 80, 0.88);
      --borde: rgba(151, 190, 230, 0.23);
      --azul: #59a9ff;
      --azul-claro: #9ed0ff;
      --texto: #f4f8ff;
      --texto-secundario: #b9d3ef;
      --verde: #6ee7a8;
      --rojo: #ff8d8d;
      --sombra: 0 20px 55px rgba(0, 0, 0, 0.3);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family:
        Inter,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      color: var(--texto);
      background:
        radial-gradient(
          circle at top,
          rgba(57, 123, 195, 0.28),
          transparent 40%
        ),
        linear-gradient(
          180deg,
          var(--fondo-superior) 0%,
          var(--fondo-inferior) 100%
        );
    }

    button,
    input {
      font: inherit;
    }

    .pagina {
      width: min(1250px, calc(100% - 30px));
      margin: 0 auto;
      padding: 42px 0 45px;
    }

    .encabezado {
      margin-bottom: 24px;
      text-align: center;
    }

    .encabezado h1 {
      margin: 0;
      font-size: clamp(2.4rem, 7vw, 4.2rem);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .encabezado p {
      margin: 15px 0 0;
      color: var(--azul-claro);
      font-size: 1.05rem;
    }

    .panel {
      border: 1px solid var(--borde);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: var(--sombra);
    }

    .buscador-panel {
      position: relative;
      z-index: 20;
      margin-bottom: 18px;
      padding: 20px;
    }

    .buscador-etiqueta {
      display: block;
      margin-bottom: 9px;
      color: var(--azul-claro);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .buscador-fila {
      display: flex;
      gap: 10px;
    }

    .buscador-contenedor {
      position: relative;
      flex: 1;
      min-width: 0;
    }

    .buscador-input {
      width: 100%;
      min-height: 50px;
      padding: 0 48px 0 15px;
      border: 1px solid var(--borde);
      border-radius: 14px;
      outline: none;
      color: var(--texto);
      background: rgba(255, 255, 255, 0.055);
      transition:
        border-color 0.15s ease,
        box-shadow 0.15s ease;
    }

    .buscador-input:focus {
      border-color: var(--azul);
      box-shadow: 0 0 0 3px rgba(89, 169, 255, 0.16);
    }

    .buscador-icono {
      position: absolute;
      top: 50%;
      right: 16px;
      color: var(--texto-secundario);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .sugerencias {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      overflow: hidden;
      max-height: 360px;
      border: 1px solid var(--borde);
      border-radius: 15px;
      background: #091d34;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
      overflow-y: auto;
    }

    .sugerencia {
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 13px 15px;
      border: 0;
      border-bottom: 1px solid var(--borde);
      color: var(--texto);
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .sugerencia:last-child {
      border-bottom: 0;
    }

    .sugerencia:hover,
    .sugerencia.activa {
      background: rgba(89, 169, 255, 0.14);
    }

    .sugerencia-nombre {
      font-weight: 800;
    }

    .sugerencia-provincia {
      color: var(--texto-secundario);
      font-size: 0.88rem;
    }

    .sugerencia-id {
      flex-shrink: 0;
      color: var(--azul-claro);
      font-size: 0.78rem;
    }

    .sin-resultados {
      padding: 16px;
      color: var(--texto-secundario);
      text-align: center;
    }

    .contador-localidades {
      margin-top: 10px;
      color: var(--texto-secundario);
      font-size: 0.88rem;
    }

    .resumen {
      padding: 20px;
    }

    .barra-superior {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
    }

    .ubicacion {
      min-width: 0;
    }

    .ubicacion-etiqueta {
      display: block;
      margin-bottom: 5px;
      color: var(--azul-claro);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .ubicacion h2 {
      margin: 0;
      font-size: clamp(1.25rem, 4vw, 1.9rem);
    }

    .ubicacion p {
      margin: 5px 0 0;
      color: var(--texto-secundario);
    }

    .boton-actualizar {
      flex-shrink: 0;
      min-height: 46px;
      padding: 0 20px;
      border: 0;
      border-radius: 13px;
      color: #031324;
      background: var(--azul);
      font-weight: 800;
      cursor: pointer;
      transition:
        transform 0.15s ease,
        filter 0.15s ease;
    }

    .boton-actualizar:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    .boton-actualizar:disabled {
      cursor: wait;
      filter: grayscale(0.4);
      opacity: 0.7;
      transform: none;
    }

    .estado {
      margin-top: 18px;
      padding: 13px 15px;
      border: 1px solid var(--borde);
      border-radius: 13px;
      color: var(--texto-secundario);
      background: rgba(255, 255, 255, 0.035);
    }

    .estado-cargando {
      color: var(--azul-claro);
    }

    .estado-correcto {
      color: var(--verde);
      border-color: rgba(110, 231, 168, 0.4);
    }

    .estado-error {
      color: var(--rojo);
      border-color: rgba(255, 141, 141, 0.45);
    }

    .actual {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(260px, 0.75fr);
      gap: 18px;
      margin-top: 18px;
    }

    .actual-principal,
    .actual-detalles {
      padding: 20px;
      border: 1px solid var(--borde);
      border-radius: 17px;
      background: var(--panel-secundario);
    }

    .actual-periodo {
      color: var(--azul-claro);
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .actual-contenido {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 12px;
    }

    .actual-icono {
      width: 90px;
      text-align: center;
      font-size: 4.7rem;
      line-height: 1;
    }

    .actual-temperatura {
      font-size: clamp(3.4rem, 10vw, 5.4rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    .actual-descripcion {
      margin-top: 10px;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .actual-rango {
      margin-top: 7px;
      color: var(--texto-secundario);
    }

    .detalle-fila {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      padding: 10px 0;
      border-bottom: 1px solid var(--borde);
    }

    .detalle-fila:last-child {
      border-bottom: 0;
    }

    .detalle-fila span:first-child {
      color: var(--texto-secundario);
    }

    .detalle-fila strong {
      text-align: right;
    }

    .seccion-pronostico {
      margin-top: 28px;
    }

    .seccion-titulo {
      margin: 0 0 16px;
      font-size: 1.55rem;
    }

    .pronostico {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 17px;
    }

    .dia {
      overflow: hidden;
      border: 1px solid var(--borde);
      border-radius: 19px;
      background: var(--panel);
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.18);
    }

    .dia-encabezado {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
      padding: 18px;
      background: rgba(74, 137, 204, 0.14);
      border-bottom: 1px solid var(--borde);
    }

    .dia-fecha {
      margin: 0;
      font-size: 1.15rem;
      text-transform: capitalize;
    }

    .dia-rango {
      flex-shrink: 0;
      color: var(--azul-claro);
      font-size: 1.2rem;
      font-weight: 900;
    }

    .periodos {
      display: grid;
      gap: 1px;
      background: var(--borde);
    }

    .periodo {
      padding: 17px;
      background: rgba(7, 24, 44, 0.97);
    }

    .periodo-superior {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .periodo-nombre {
      color: var(--azul-claro);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .periodo-temperatura {
      font-size: 1.45rem;
      font-weight: 900;
    }

    .periodo-clima {
      display: flex;
      align-items: center;
      gap: 11px;
      margin-top: 12px;
    }

    .periodo-icono {
      min-width: 35px;
      font-size: 2rem;
      line-height: 1;
      text-align: center;
    }

    .periodo-descripcion {
      font-weight: 750;
    }

    .datos-periodo {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 14px;
      margin-top: 14px;
      color: var(--texto-secundario);
      font-size: 0.88rem;
    }

    .datos-periodo strong {
      color: var(--texto);
    }

    .sin-periodos {
      padding: 20px;
      color: var(--texto-secundario);
    }

    .pie {
      margin-top: 30px;
      padding: 20px;
      color: var(--texto-secundario);
      text-align: center;
      font-size: 0.9rem;
    }

    .pie a {
      color: var(--azul-claro);
    }

    .oculto {
      display: none !important;
    }

    @media (max-width: 760px) {
      .pagina {
        width: min(100% - 20px, 1250px);
        padding-top: 28px;
      }

      .buscador-fila,
      .barra-superior {
        align-items: stretch;
        flex-direction: column;
      }

      .boton-actualizar {
        width: 100%;
      }

      .actual {
        grid-template-columns: 1fr;
      }

      .actual-contenido {
        gap: 10px;
      }

      .actual-icono {
        width: 70px;
        font-size: 3.8rem;
      }

      .datos-periodo {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="pagina">
    <header class="encabezado">
      <h1>Clima Argentina</h1>
      <p>Pronóstico meteorológico por localidad</p>
    </header>

    <section class="panel buscador-panel">
      <label class="buscador-etiqueta" for="buscar-localidad">
        Buscar localidad
      </label>

      <div class="buscador-fila">
        <div class="buscador-contenedor">
          <input
            id="buscar-localidad"
            class="buscador-input"
            type="search"
            placeholder="Ejemplo: Ezeiza, Córdoba, Ushuaia..."
            autocomplete="off"
            aria-autocomplete="list"
            aria-controls="sugerencias"
            aria-expanded="false"
          >

          <span class="buscador-icono" aria-hidden="true">⌕</span>

          <div
            id="sugerencias"
            class="sugerencias oculto"
            role="listbox"
          ></div>
        </div>
      </div>

      <div id="contador-localidades" class="contador-localidades">
        Cargando localidades disponibles…
      </div>
    </section>

    <section class="panel resumen">
      <div class="barra-superior">
        <div class="ubicacion">
          <span class="ubicacion-etiqueta">Localidad seleccionada</span>
          <h2 id="nombre-localidad">Cargando localidad…</h2>
          <p id="provincia-localidad"></p>
        </div>

        <button
          id="boton-actualizar"
          class="boton-actualizar"
          type="button"
        >
          Actualizar
        </button>
      </div>

      <div
        id="estado"
        class="estado estado-cargando"
        role="status"
        aria-live="polite"
      >
        Cargando pronóstico actualizado…
      </div>

      <div id="actual" class="actual oculto">
        <article class="actual-principal">
          <div id="actual-periodo" class="actual-periodo">
            Pronóstico actual
          </div>

          <div class="actual-contenido">
            <div id="actual-icono" class="actual-icono">🌤️</div>

            <div>
              <div id="actual-temperatura" class="actual-temperatura">
                --°
              </div>

              <div id="actual-descripcion" class="actual-descripcion">
                Sin información
              </div>

              <div id="actual-rango" class="actual-rango"></div>
            </div>
          </div>
        </article>

        <article id="actual-detalles" class="actual-detalles"></article>
      </div>
    </section>

    <section class="seccion-pronostico">
      <h2 class="seccion-titulo">Pronóstico extendido</h2>
      <div id="pronostico" class="pronostico"></div>
    </section>

    <footer class="panel pie">
      <div>
        Información obtenida del
        <a
          href="https://www.smn.gob.ar/"
          target="_blank"
          rel="noopener noreferrer"
        >
          Servicio Meteorológico Nacional
        </a>.
      </div>

      <div id="fecha-generacion" style="margin-top: 6px;"></div>
    </footer>
  </main>

  <script>
    const URL_INDICE = "./data/pronosticos/index.json";
    const CARPETA_PRONOSTICOS = "./data/pronosticos";
    const ID_PREDETERMINADO = 4864;
    const CLAVE_LOCALIDAD = "climaArgentinaLocalidad";

    const PERIODOS = [
      { clave: "early_morning", nombre: "Madrugada" },
      { clave: "morning", nombre: "Mañana" },
      { clave: "afternoon", nombre: "Tarde" },
      { clave: "night", nombre: "Noche" }
    ];

    const buscarLocalidad = document.getElementById("buscar-localidad");
    const sugerencias = document.getElementById("sugerencias");
    const contadorLocalidades = document.getElementById(
      "contador-localidades"
    );

    const nombreLocalidad = document.getElementById("nombre-localidad");
    const provinciaLocalidad = document.getElementById(
      "provincia-localidad"
    );
    const botonActualizar = document.getElementById("boton-actualizar");
    const estado = document.getElementById("estado");
    const actual = document.getElementById("actual");
    const actualPeriodo = document.getElementById("actual-periodo");
    const actualIcono = document.getElementById("actual-icono");
    const actualTemperatura = document.getElementById(
      "actual-temperatura"
    );
    const actualDescripcion = document.getElementById(
      "actual-descripcion"
    );
    const actualRango = document.getElementById("actual-rango");
    const actualDetalles = document.getElementById("actual-detalles");
    const contenedorPronostico = document.getElementById("pronostico");
    const fechaGeneracion = document.getElementById("fecha-generacion");

    let localidadesDisponibles = [];
    let localidadActualId = ID_PREDETERMINADO;
    let resultadosActuales = [];
    let indiceActivo = -1;

    function escaparHTML(valor) {
      return String(valor ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizarTexto(valor) {
      return String(valor ?? "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .trim();
    }

    function formatearFecha(fechaISO) {
      const fecha = new Date(`${fechaISO}T12:00:00`);

      return new Intl.DateTimeFormat("es-AR", {
        weekday: "long",
        day: "numeric",
        month: "long"
      }).format(fecha);
    }

    function formatearFechaHora(fechaISO) {
      if (!fechaISO) {
        return "Fecha de generación no disponible";
      }

      const fecha = new Date(fechaISO);

      return new Intl.DateTimeFormat("es-AR", {
        dateStyle: "short",
        timeStyle: "short",
        timeZone: "America/Argentina/Buenos_Aires"
      }).format(fecha);
    }

    function obtenerFechaArgentina() {
      const partes = new Intl.DateTimeFormat("en-CA", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        timeZone: "America/Argentina/Buenos_Aires"
      }).formatToParts(new Date());

      const mapa = Object.fromEntries(
        partes.map(parte => [parte.type, parte.value])
      );

      return `${mapa.year}-${mapa.month}-${mapa.day}`;
    }

    function formatearRango(rango, unidad = "") {
      if (!Array.isArray(rango) || rango.length === 0) {
        return "No informado";
      }

      const valores = rango.filter(
        valor => valor !== null && valor !== undefined
      );

      if (valores.length === 0) {
        return "No informado";
      }

      if (valores.length === 1 || valores[0] === valores[1]) {
        return `${valores[0]}${unidad}`;
      }

      return `${valores[0]}–${valores[1]}${unidad}`;
    }

    function obtenerIcono(descripcion) {
      const texto = normalizarTexto(descripcion);

      if (texto.includes("tormenta") || texto.includes("electr")) {
        return "⛈️";
      }

      if (texto.includes("nieve") || texto.includes("nevada")) {
        return "🌨️";
      }

      if (texto.includes("lluvia") || texto.includes("llovizna")) {
        return "🌧️";
      }

      if (
        texto.includes("niebla") ||
        texto.includes("neblina") ||
        texto.includes("bruma")
      ) {
        return "🌫️";
      }

      if (texto.includes("despejado")) {
        return "☀️";
      }

      if (
        texto.includes("ligeramente nublado") ||
        texto.includes("algo nublado") ||
        texto.includes("parcialmente nublado")
      ) {
        return "🌤️";
      }

      if (
        texto.includes("mayormente nublado") ||
        texto.includes("nublado") ||
        texto.includes("cubierto")
      ) {
        return "☁️";
      }

      return "🌡️";
    }

    function obtenerPeriodoActual(dia) {
      const horaArgentina = Number(
        new Intl.DateTimeFormat("es-AR", {
          hour: "2-digit",
          hourCycle: "h23",
          timeZone: "America/Argentina/Buenos_Aires"
        }).format(new Date())
      );

      let preferido;

      if (horaArgentina < 6) {
        preferido = "early_morning";
      } else if (horaArgentina < 12) {
        preferido = "morning";
      } else if (horaArgentina < 18) {
        preferido = "afternoon";
      } else {
        preferido = "night";
      }

      const orden = [
        preferido,
        "early_morning",
        "morning",
        "afternoon",
        "night"
      ];

      for (const clave of [...new Set(orden)]) {
        if (dia?.[clave]) {
          const configuracion = PERIODOS.find(
            periodo => periodo.clave === clave
          );

          return {
            clave,
            nombre: configuracion?.nombre ?? "Pronóstico",
            datos: dia[clave]
          };
        }
      }

      return null;
    }

    function crearFilaDetalle(nombre, valor) {
      return `
        <div class="detalle-fila">
          <span>${escaparHTML(nombre)}</span>
          <strong>${escaparHTML(valor)}</strong>
        </div>
      `;
    }

    function renderizarActual(dia) {
      const periodo = obtenerPeriodoActual(dia);

      if (!periodo) {
        actual.classList.add("oculto");
        return;
      }

      const datos = periodo.datos;
      const descripcion =
        datos.weather?.description ?? "Sin descripción";

      actualPeriodo.textContent = periodo.nombre;
      actualIcono.textContent = obtenerIcono(descripcion);

      actualTemperatura.textContent =
        datos.temperature !== null &&
        datos.temperature !== undefined
          ? `${datos.temperature}°`
          : "--°";

      actualDescripcion.textContent = descripcion;

      actualRango.textContent =
        `Mínima ${dia.temp_min ?? "--"}° · ` +
        `Máxima ${dia.temp_max ?? "--"}°`;

      const lluvia = formatearRango(
        datos.rain_prob_range,
        "%"
      );

      const viento = datos.wind
        ? `${formatearRango(
            datos.wind.speed_range,
            " km/h"
          )}${datos.wind.direction ? ` del ${datos.wind.direction}` : ""}`
        : "No informado";

      const rafagas = formatearRango(
        datos.gust_range,
        " km/h"
      );

      actualDetalles.innerHTML = [
        crearFilaDetalle(
          "Probabilidad de precipitación",
          lluvia
        ),
        crearFilaDetalle(
          "Humedad",
          datos.humidity !== null &&
          datos.humidity !== undefined
            ? `${datos.humidity}%`
            : "No informada"
        ),
        crearFilaDetalle("Viento", viento),
        crearFilaDetalle("Ráfagas", rafagas),
        crearFilaDetalle(
          "Visibilidad",
          datos.visibility ?? "No informada"
        )
      ].join("");

      actual.classList.remove("oculto");
    }

    function crearPeriodo(periodo, nombrePeriodo) {
      const descripcion =
        periodo.weather?.description ?? "Sin descripción";

      const viento = periodo.wind
        ? `${formatearRango(
            periodo.wind.speed_range,
            " km/h"
          )}${periodo.wind.direction ? ` ${periodo.wind.direction}` : ""}`
        : "No informado";

      const lluvia = formatearRango(
        periodo.rain_prob_range,
        "%"
      );

      const humedad =
        periodo.humidity !== null &&
        periodo.humidity !== undefined
          ? `${periodo.humidity}%`
          : "No informada";

      return `
        <div class="periodo">
          <div class="periodo-superior">
            <span class="periodo-nombre">
              ${escaparHTML(nombrePeriodo)}
            </span>

            <span class="periodo-temperatura">
              ${
                periodo.temperature !== null &&
                periodo.temperature !== undefined
                  ? `${escaparHTML(periodo.temperature)}°`
                  : "--°"
              }
            </span>
          </div>

          <div class="periodo-clima">
            <span class="periodo-icono">
              ${obtenerIcono(descripcion)}
            </span>

            <span class="periodo-descripcion">
              ${escaparHTML(descripcion)}
            </span>
          </div>

          <div class="datos-periodo">
            <span>
              Lluvia:
              <strong>${escaparHTML(lluvia)}</strong>
            </span>

            <span>
              Humedad:
              <strong>${escaparHTML(humedad)}</strong>
            </span>

            <span>
              Viento:
              <strong>${escaparHTML(viento)}</strong>
            </span>

            <span>
              Visibilidad:
              <strong>
                ${escaparHTML(
                  periodo.visibility ?? "No informada"
                )}
              </strong>
            </span>
          </div>
        </div>
      `;
    }

    function crearDia(dia) {
      const periodosDisponibles = PERIODOS
        .filter(periodo => dia[periodo.clave])
        .map(periodo =>
          crearPeriodo(
            dia[periodo.clave],
            periodo.nombre
          )
        )
        .join("");

      return `
        <article class="dia">
          <header class="dia-encabezado">
            <h3 class="dia-fecha">
              ${escaparHTML(formatearFecha(dia.date))}
            </h3>

            <div class="dia-rango">
              ${escaparHTML(dia.temp_min ?? "--")}° /
              ${escaparHTML(dia.temp_max ?? "--")}°
            </div>
          </header>

          <div class="periodos">
            ${
              periodosDisponibles ||
              `
                <div class="sin-periodos">
                  No hay períodos disponibles para este día.
                </div>
              `
            }
          </div>
        </article>
      `;
    }

    function mostrarEstado(mensaje, tipo) {
      estado.textContent = mensaje;

      estado.classList.remove(
        "estado-cargando",
        "estado-correcto",
        "estado-error"
      );

      estado.classList.add(`estado-${tipo}`);
    }

    function ocultarSugerencias() {
      sugerencias.classList.add("oculto");
      buscarLocalidad.setAttribute("aria-expanded", "false");
      indiceActivo = -1;
    }

    function seleccionarLocalidad(localidad) {
      buscarLocalidad.value = "";
      ocultarSugerencias();
      cargarPronostico(localidad.id, false);
    }

    function renderizarSugerencias(resultados) {
      resultadosActuales = resultados;
      indiceActivo = -1;

      if (resultados.length === 0) {
        sugerencias.innerHTML = `
          <div class="sin-resultados">
            No se encontraron localidades disponibles.
          </div>
        `;
      } else {
        sugerencias.innerHTML = resultados
          .map(
            (localidad, indice) => `
              <button
                class="sugerencia"
                type="button"
                role="option"
                data-indice="${indice}"
              >
                <span>
                  <span class="sugerencia-nombre">
                    ${escaparHTML(localidad.name)}
                  </span>
                  <br>
                  <span class="sugerencia-provincia">
                    ${escaparHTML(localidad.province)}
                  </span>
                </span>

                <span class="sugerencia-id">
                  ID ${escaparHTML(localidad.id)}
                </span>
              </button>
            `
          )
          .join("");
      }

      sugerencias.classList.remove("oculto");
      buscarLocalidad.setAttribute("aria-expanded", "true");

      sugerencias
        .querySelectorAll(".sugerencia")
        .forEach(boton => {
          boton.addEventListener("click", () => {
            const indice = Number(boton.dataset.indice);
            seleccionarLocalidad(resultadosActuales[indice]);
          });
        });
    }

    function buscarCoincidencias(consulta) {
      const texto = normalizarTexto(consulta);

      if (!texto) {
        return localidadesDisponibles.slice(0, 12);
      }

      return localidadesDisponibles
        .filter(localidad => {
          const nombre = normalizarTexto(localidad.name);
          const provincia = normalizarTexto(localidad.province);
          const combinado = `${nombre} ${provincia}`;

          return (
            nombre.includes(texto) ||
            provincia.includes(texto) ||
            combinado.includes(texto)
          );
        })
        .slice(0, 12);
    }

    function actualizarSeleccionTeclado() {
      const botones = sugerencias.querySelectorAll(".sugerencia");

      botones.forEach((boton, indice) => {
        boton.classList.toggle(
          "activa",
          indice === indiceActivo
        );
      });

      if (indiceActivo >= 0 && botones[indiceActivo]) {
        botones[indiceActivo].scrollIntoView({
          block: "nearest"
        });
      }
    }

    function obtenerIdInicial() {
      const parametros = new URLSearchParams(window.location.search);
      const idURL = Number(parametros.get("id"));

      if (
        Number.isInteger(idURL) &&
        localidadesDisponibles.some(
          localidad => localidad.id === idURL
        )
      ) {
        return idURL;
      }

      const idGuardado = Number(
        localStorage.getItem(CLAVE_LOCALIDAD)
      );

      if (
        Number.isInteger(idGuardado) &&
        localidadesDisponibles.some(
          localidad => localidad.id === idGuardado
        )
      ) {
        return idGuardado;
      }

      if (
        localidadesDisponibles.some(
          localidad => localidad.id === ID_PREDETERMINADO
        )
      ) {
        return ID_PREDETERMINADO;
      }

      return localidadesDisponibles[0]?.id;
    }

    async function cargarIndice() {
      const respuesta = await fetch(
        `${URL_INDICE}?v=${Date.now()}`,
        { cache: "no-store" }
      );

      if (!respuesta.ok) {
        throw new Error(
          `No se pudo cargar el índice de localidades (${respuesta.status}).`
        );
      }

      const datos = await respuesta.json();
      const disponibles = Array.isArray(datos.available)
        ? datos.available
        : [];

      localidadesDisponibles = disponibles
        .map(localidad => ({
          id: Number(localidad.id),
          name: String(localidad.name ?? "").trim(),
          province: String(localidad.province ?? "").trim(),
          file: String(localidad.file ?? "")
        }))
        .filter(
          localidad =>
            Number.isInteger(localidad.id) &&
            localidad.name &&
            localidad.file
        )
        .sort((a, b) =>
          `${a.province} ${a.name}`.localeCompare(
            `${b.province} ${b.name}`,
            "es",
            { sensitivity: "base" }
          )
        );

      if (localidadesDisponibles.length === 0) {
        throw new Error(
          "El índice no contiene pronósticos disponibles."
        );
      }

      contadorLocalidades.textContent =
        `${localidadesDisponibles.length} localidades con pronóstico disponible.`;
    }

    async function cargarPronostico(
      localidadId = localidadActualId,
      forzarActualizacion = false
    ) {
      localidadActualId = Number(localidadId);

      botonActualizar.disabled = true;
      botonActualizar.textContent = "Actualizando…";

      mostrarEstado(
        "Cargando pronóstico actualizado…",
        "cargando"
      );

      try {
        const localidadIndice = localidadesDisponibles.find(
          localidad => localidad.id === localidadActualId
        );

        if (!localidadIndice) {
          throw new Error(
            "La localidad seleccionada no está disponible."
          );
        }

        const version = forzarActualizacion
          ? Date.now()
          : "actual";

        const respuesta = await fetch(
          `${CARPETA_PRONOSTICOS}/${localidadIndice.file}?v=${version}`,
          { cache: "no-store" }
        );

        if (!respuesta.ok) {
          throw new Error(
            `El archivo respondió ${respuesta.status}.`
          );
        }

        const datos = await respuesta.json();

        if (
          !datos.location ||
          !Array.isArray(datos.forecast) ||
          datos.forecast.length === 0
        ) {
          throw new Error(
            "El archivo no contiene un pronóstico válido."
          );
        }

        localidadActualId = Number(datos.location.id);

        localStorage.setItem(
          CLAVE_LOCALIDAD,
          String(localidadActualId)
        );

        const nuevaURL = new URL(window.location.href);
        nuevaURL.searchParams.set(
          "id",
          String(localidadActualId)
        );
        window.history.replaceState(
          {},
          "",
          nuevaURL
        );

        nombreLocalidad.textContent =
          datos.location.name ?? localidadIndice.name;

        provinciaLocalidad.textContent = [
          datos.location.department,
          datos.location.province
        ]
          .filter(Boolean)
          .filter(
            (valor, indice, lista) =>
              lista.indexOf(valor) === indice
          )
          .join(" · ");

        const fechaHoy = obtenerFechaArgentina();

        const diaActual =
          datos.forecast.find(
            dia => dia.date === fechaHoy
          ) ?? datos.forecast[0];

        renderizarActual(diaActual);

        contenedorPronostico.innerHTML =
          datos.forecast
            .map(crearDia)
            .join("");

        fechaGeneracion.textContent =
          `Archivo actualizado: ${formatearFechaHora(
            datos.generated_at
          )}`;

        mostrarEstado(
          `Pronóstico actualizado correctamente. ` +
          `${datos.forecast.length} días disponibles.`,
          "correcto"
        );
      } catch (error) {
        console.error(error);

        actual.classList.add("oculto");
        contenedorPronostico.innerHTML = "";

        mostrarEstado(
          `No se pudo cargar el pronóstico: ${error.message}`,
          "error"
        );

        fechaGeneracion.textContent = "";
      } finally {
        botonActualizar.disabled = false;
        botonActualizar.textContent = "Actualizar";
      }
    }

    buscarLocalidad.addEventListener("input", () => {
      renderizarSugerencias(
        buscarCoincidencias(buscarLocalidad.value)
      );
    });

    buscarLocalidad.addEventListener("focus", () => {
      renderizarSugerencias(
        buscarCoincidencias(buscarLocalidad.value)
      );
    });

    buscarLocalidad.addEventListener("keydown", evento => {
      if (sugerencias.classList.contains("oculto")) {
        return;
      }

      if (evento.key === "ArrowDown") {
        evento.preventDefault();

        indiceActivo = Math.min(
          indiceActivo + 1,
          resultadosActuales.length - 1
        );

        actualizarSeleccionTeclado();
      }

      if (evento.key === "ArrowUp") {
        evento.preventDefault();

        indiceActivo = Math.max(
          indiceActivo - 1,
          0
        );

        actualizarSeleccionTeclado();
      }

      if (
        evento.key === "Enter" &&
        indiceActivo >= 0 &&
        resultadosActuales[indiceActivo]
      ) {
        evento.preventDefault();
        seleccionarLocalidad(
          resultadosActuales[indiceActivo]
        );
      }

      if (evento.key === "Escape") {
        ocultarSugerencias();
      }
    });

    document.addEventListener("click", evento => {
      if (
        !evento.target.closest(".buscador-contenedor")
      ) {
        ocultarSugerencias();
      }
    });

    botonActualizar.addEventListener("click", () => {
      cargarPronostico(localidadActualId, true);
    });

    async function iniciar() {
      try {
        await cargarIndice();

        const idInicial = obtenerIdInicial();

        if (!idInicial) {
          throw new Error(
            "No hay ninguna localidad disponible."
          );
        }

        await cargarPronostico(idInicial, false);
      } catch (error) {
        console.error(error);

        contadorLocalidades.textContent =
          "No se pudo cargar la lista de localidades.";

        mostrarEstado(
          `No se pudo iniciar la página: ${error.message}`,
          "error"
        );
      }
    }

    iniciar();
  </script>
</body>
</html>
