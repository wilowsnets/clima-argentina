name: Actualizar estado actual

on:
  workflow_dispatch:

  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write

concurrency:
  group: actualizar-estado
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Descargar datos del SMN
        run: python scripts/actualizar_estado.py

      - name: Publicar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/data/estado_actual.json

          if git diff --cached --quiet; then
            echo "No hay cambios"
            exit 0
          fi

          git commit -m "Actualizar estado meteorológico"
          git push
