name: Actualizar datos meteorológicos

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: actualizar-datos-meteorologicos
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Actualizar catálogo de localidades
        run: |
          python scripts/actualizar_localidades.py

      - name: Actualizar pronósticos
        run: |
          python scripts/actualizar_pronostico.py

      - name: Vincular localidades con áreas de alerta
        run: |
          python scripts/generar_mapa_alertas.py

      - name: Actualizar alertas
        run: |
          python scripts/actualizar_alertas.py

      - name: Verificar archivos generados
        run: |
          test -f docs/data/localidades.json
          test -f docs/data/pronostico.json
          test -f docs/data/pronosticos/index.json
          test -f docs/data/alertas.json
          test -f docs/data/areas_alerta.geojson
          test -f docs/data/localidades_alerta.json

          echo "Cantidad de archivos de pronóstico:"
          find docs/data/pronosticos -maxdepth 1 -type f | wc -l

          echo "Resumen de pronósticos:"
          python - <<'PY'
          import json
          from pathlib import Path

          ruta = Path("docs/data/pronosticos/index.json")
          datos = json.loads(ruta.read_text(encoding="utf-8"))

          print("Catálogo:", datos.get("catalog_count"))
          print("Disponibles:", datos.get("available_count"))
          print("Fallidos:", datos.get("failed_count"))
          print("Solo observaciones:", datos.get("observation_only_count"))
          PY

          echo "Resumen de asociación de alertas:"
          python - <<'PY'
          import json
          from pathlib import Path

          ruta = Path("docs/data/localidades_alerta.json")
          datos = json.loads(ruta.read_text(encoding="utf-8"))

          print("Áreas:", datos.get("area_count"))
          print("Localidades procesadas:", datos.get("locality_count"))
          print("Localidades con área:", datos.get("matched_locality_count"))
          print("Localidades sin área:", datos.get("unmatched_locality_count"))
          print("Coincidencias múltiples:", datos.get("multiple_match_count"))
          PY

          echo "Resumen de alertas:"
          python - <<'PY'
          import json
          from pathlib import Path

          ruta = Path("docs/data/alertas.json")
          datos = json.loads(ruta.read_text(encoding="utf-8"))

          print("Estado:", datos.get("status"))
          print("Alertas activas:", datos.get("active_count"))
          print("Áreas afectadas:", datos.get("affected_area_count"))
          print("Nivel máximo:", datos.get("max_level"))
          PY

      - name: Guardar todos los archivos actualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A docs/data

          if git diff --cached --quiet; then
            echo "No hay cambios nuevos para guardar."
            exit 0
          fi

          git commit -m "Actualizar pronósticos, localidades y alertas"
          git pull --rebase origin main
          git push origin HEAD:main
