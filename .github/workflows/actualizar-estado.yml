name: Actualizar datos meteorológicos

on:
workflow_dispatch:
schedule:
- cron: "15 */3 * * *"

permissions:
contents: write

concurrency:
group: actualizar-datos-meteorologicos
cancel-in-progress: false

jobs:
actualizar:
runs-on: ubuntu-latest

```
steps:
  - name: Descargar repositorio
    uses: actions/checkout@v4

  - name: Configurar Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.12"

  - name: Instalar dependencias
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  - name: Actualizar estado meteorológico
    run: |
      python scripts/actualizar_estado.py

  - name: Actualizar pronóstico
    run: |
      python scripts/actualizar_pronostico.py

  - name: Verificar archivos generados
    run: |
      echo "Contenido de docs/data:"
      ls -lah docs/data
      test -f docs/data/estado_actual.json
      test -f docs/data/pronostico.json

  - name: Guardar cambios
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      git add docs/data/estado_actual.json
      git add docs/data/pronostico.json

      if git diff --cached --quiet; then
        echo "No hubo cambios para guardar."
      else
        git commit -m "Actualizar datos meteorológicos"
        git push
      fi
