{
"name": "Actualizar datos meteorológicos",
"on": {
"workflow_dispatch": {},
"schedule": [
{
"cron": "15 */3 * * *"
}
]
},
"permissions": {
"contents": "write"
},
"concurrency": {
"group": "actualizar-datos-meteorologicos",
"cancel-in-progress": false
},
"jobs": {
"actualizar": {
"runs-on": "ubuntu-latest",
"steps": [
{
"name": "Descargar repositorio",
"uses": "actions/checkout@v4"
},
{
"name": "Configurar Python",
"uses": "actions/setup-python@v5",
"with": {
"python-version": "3.12"
}
},
{
"name": "Instalar dependencias",
"run": "python -m pip install --upgrade pip\npip install -r requirements.txt"
},
{
"name": "Actualizar estado meteorológico",
"run": "python scripts/actualizar_estado.py"
},
{
"name": "Actualizar pronóstico",
"run": "python scripts/actualizar_pronostico.py"
},
{
"name": "Verificar archivos generados",
"run": "echo "Contenido de docs/data:"\nls -lah docs/data\ntest -f docs/data/estado_actual.json\ntest -f docs/data/pronostico.json"
},
{
"name": "Guardar cambios",
"run": "git config user.name "github-actions[bot]"\ngit config user.email "41898282+github-actions[bot]@users.noreply.github.com"\ngit add docs/data/estado_actual.json docs/data/pronostico.json\nif git diff --cached --quiet; then\n  echo "No hubo cambios para guardar."\nelse\n  git commit -m "Actualizar datos meteorológicos"\n  git push\nfi"
}
]
}
}
}
