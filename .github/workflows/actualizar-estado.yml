name: Actualizar datos meteorológicos

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: actualizar-datos-meteorologicos
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Actualizar pronóstico
        run: |
          python scripts/actualizar_pronostico.py

      - name: Actualizar catálogo de localidades
        run: |
          python scripts/actualizar_localidades.py

      - name: Guardar archivos actualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/data/

          if git diff --cached --quiet; then
            echo "No hay cambios nuevos para guardar."
            exit 0
          fi

          git commit -m "Actualizar pronóstico y localidades"
          git pull --rebase
          git push
