name: Actualizar satélite SMN

on:
  workflow_dispatch:
  schedule:
    # Dos veces por hora. GitHub Actions puede ejecutarlo con demora.
    - cron: "7,37 * * * *"

permissions:
  contents: write

concurrency:
  group: actualizar-satelite-smn
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Actualizar catálogo satelital
        run: |
          python scripts/actualizar_satelite_smn.py

      - name: Verificar JSON generado
        run: |
          python -m json.tool \
            docs/data/satelite/argentina/index.json

      - name: Guardar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            docs/data/satelite/argentina/index.json \
            scripts/actualizar_satelite_smn.py \
            .github/workflows/actualizar-satelite-smn.yml

          if git diff --cached --quiet; then
            echo "No hay cambios satelitales para guardar."
          else
            git commit -m "Actualizar imágenes satelitales SMN"
            git push
          fi
