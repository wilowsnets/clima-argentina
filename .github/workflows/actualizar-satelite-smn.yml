name: Actualizar satélite SMN

run-name: Satélite SMN · disparo externo

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: actualizar-satelite-smn
  cancel-in-progress: true

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Actualizar catálogo satelital
        run: |
          python scripts/actualizar_satelite_smn.py

      - name: Verificar JSON generado
        run: |
          python -m json.tool docs/data/satelite/argentina/index.json

      - name: Guardar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/data/satelite/argentina/index.json

          if git diff --cached --quiet; then
            echo "No hay cambios satelitales para guardar."
          else
            git commit -m "Actualizar imágenes satelitales SMN"
            git push
          fi
